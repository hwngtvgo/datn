version: '3.8'

services:
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: toeic-backend-local
    environment:
      - SPRING_PROFILES_ACTIVE=local
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - toeic-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: toeic-frontend-local
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - toeic-network
    restart: unless-stopped

volumes:
  backend_uploads:
    driver: local
  backend_logs:
    driver: local

networks:
  toeic-network:
    driver: bridge 