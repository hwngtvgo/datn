spring.application.name=be
server.port=8080

# Database Configuration - Khớp với docker-compose.production.yml
spring.datasource.url=jdbc:mysql://mysql:3306/toeic_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Bangkok&useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=REDACTED_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Cấu hình timezone
spring.jackson.time-zone=Asia/Bangkok

# JWT Configuration
app.jwt.secret=REDACTED_JWT_SECRET
app.jwt.expirationMs=86400000
app.jwt.cookieName=toeic-jwt
app.jwt.refreshCookieName=toeic-jwt-refresh

# Cookie Configuration (Production VPS)
app.cookie.secure=false
app.cookie.sameSite=lax
app.cookie.domain=
app.cookie.path=/
app.cookie.httpOnly=true
app.cookie.maxAge=2592000

# CORS Configuration (VPS)
spring.web.cors.allowed-origins=http://YOUR_VPS_IP,http://YOUR_VPS_IP:80,http://YOUR_VPS_IP:8080,http://localhost:3000,http://localhost:5173,https://toeicsoict.me,http://toeicsoict.me,https://www.toeicsoict.me,http://www.toeicsoict.me
spring.web.cors.allow-credentials=true
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.exposed-headers=Authorization,Content-Type,Set-Cookie

# Logging Configuration
logging.level.root=INFO
logging.level.com.hungtv.toeic=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Swagger Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true

# Session cookie (VPS)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.path=/
server.servlet.session.cookie.domain=

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=hung161203@gmail.com
spring.mail.password=REDACTED_MAIL_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Password Reset Configuration (VPS)
app.password-reset.expiration-minutes=30
app.email.from=noreply@toeiclearning.com
app.frontend-url=https://toeicsoict.me

# Multipart File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
spring.servlet.multipart.resolve-lazily=false

# File Storage Configuration
file.upload-dir=uploads
app.file.upload-dir=./uploads
app.file.audio-dir=./uploads/audio
app.file.image-dir=./uploads/images
file.allowed-extensions=jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx,ppt,pptx,mp3,mp4,wav,zip,rar
file.max-file-size=10485760

# Logging to file
logging.file.name=logs/application.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# OpenAI Configuration
openai.api.key=REMOVED_OPENAI_KEY

