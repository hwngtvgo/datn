version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: REDACTED_DB_PASSWORD
      MYSQL_DATABASE: toeic_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Dumpdatn.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pREDACTED_DB_PASSWORD"]
      timeout: 20s
      retries: 10

  backend:
    image: hwngtv/toeic-backend:latest
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/toeic_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: REDACTED_DB_PASSWORD
      # OpenAI Configuration
      OPENAI_API_KEY: REMOVED_OPENAI_KEY
      # JWT Configuration
      JWT_SECRET: mySecretKey123456789012345678901234567890
      JWT_EXPIRATION: 86400000
      # Email Configuration
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: hung161203@gmail.com
      SPRING_MAIL_PASSWORD: REDACTED_MAIL_PASSWORD
      # Cloudinary Configuration
      CLOUDINARY_CLOUD_NAME: dscl5hwyq
      CLOUDINARY_API_KEY: 732421283418323
      CLOUDINARY_API_SECRET: 81TBMgZUiGytDP196GaH4pObfj8
      # Password Reset Configuration
      PASSWORD_RESET_TOKEN_EXPIRATION: 3600000
      PASSWORD_RESET_BASE_URL: http://YOUR_VPS_IP
      # Frontend URL Configuration
      APP_FRONTEND_URL: http://YOUR_VPS_IP
      APP_EMAIL_FROM: noreply@toeiclearning.com
      # File Storage Configuration
      FILE_UPLOAD_DIR: /app/uploads
      FILE_ALLOWED_EXTENSIONS: jpg,jpeg,png,gif,pdf,doc,docx,mp3,wav,mp4,avi
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: hwngtv/toeic-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  backend_uploads:
  backend_logs: 