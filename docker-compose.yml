version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: toeic-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-toeic123456}
      MYSQL_DATABASE: toeic_learning
      MYSQL_USER: toeic
      MYSQL_PASSWORD: ${DB_PASSWORD:-REDACTED_DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    networks:
      - toeic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: toeic-backend
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - toeic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: toeic-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - toeic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mysql_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local

networks:
  toeic-network:
    driver: bridge
